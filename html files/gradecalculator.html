<!DOCTYPE html>
<html>
<head>
  <title>Grade Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 100px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Grade Calculator</h1>

  <!-- Assignment 1 -->
  <div>
    <input type="number" id="score1" placeholder="Score 1">
    <input type="number" id="weight1" placeholder="Weight %">
  </div>

  <!-- Assignment 2 -->
  <div>
    <input type="number" id="score2" placeholder="Score 2">
    <input type="number" id="weight2" placeholder="Weight %">
  </div>

  <!-- Assignment 3 -->
  <div>
    <input type="number" id="score3" placeholder="Score 3">
    <input type="number" id="weight3" placeholder="Weight %">
  </div>

  <button onclick="calculateGrade()">Calculate</button>

  <div id="result"></div>

  <script>
    function calculateGrade() {
      let score1 = parseFloat(document.getElementById("score1").value) || 0;
      let weight1 = parseFloat(document.getElementById("weight1").value) || 0;

      let score2 = parseFloat(document.getElementById("score2").value) || 0;
      let weight2 = parseFloat(document.getElementById("weight2").value) || 0;

      let score3 = parseFloat(document.getElementById("score3").value) || 0;
      let weight3 = parseFloat(document.getElementById("weight3").value) || 0;

      let finalGrade =
        (score1 * weight1 +
         score2 * weight2 +
         score3 * weight3) / 100;

      document.getElementById("result").innerText =
        "Final Grade: " + finalGrade.toFixed(2) + "%";
    }
  </script>

</body>
</html>
